<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MyheroGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="screen-wrap">

      <!-- Screen 1: Class Selection -->
      <section id="class-screen" class="screen">
        <header class="top-bar">
          <h1 class="logo">MyheroGuide</h1>
          <span class="top-hint">직업 선택</span>
        </header>
        <ul id="class-list" class="card-list"></ul>
      </section>

      <!-- Screen 2: Weapon Selection -->
      <section id="weapon-screen" class="screen">
        <header class="top-bar">
          <button id="back-btn" class="back-btn" aria-label="뒤로가기">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M11 3.5L5.5 9L11 14.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="back-label"></span>
          </button>
          <span class="top-hint">무기 선택</span>
        </header>
        <ul id="weapon-list" class="card-list scrollable"></ul>
      </section>

    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
